services:
  postgres:
    image: postgres:17-alpine
    container_name: comicrealmdb
    environment:
      POSTGRES_DB: comicrealm
      POSTGRES_USER: comicrealm
      POSTGRES_PASSWORD: comicrealm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comicrealm -d comicrealm"]
      interval: 5s
      timeout: 5s
      retries: 10

  comicrealm-migrate:
    build:
      context: ./ComicRealmBE
      dockerfile: Dockerfile
    container_name: comicrealm-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${COMICREAL_DEFAULT_CONNECTION}
    command: ["dotnet", "ComicRealmBE.dll", "--migrate-only"]

  comicrealmbe:
    build:
      context: ./ComicRealmBE
      dockerfile: Dockerfile
    container_name: comicrealmbe
    depends_on:
      comicrealm-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${COMICREAL_DEFAULT_CONNECTION}
    ports:
      - "5053:8080"

  comicrealmfe:
    build:
      context: ./ComicRealmFE
      dockerfile: Dockerfile
    container_name: comicrealmfe
    depends_on:
      comicrealmbe:
        condition: service_started
    ports:
      - "5173:5173"
    volumes:
      - ./ComicRealmFE:/app
      - comicrealmfe-node_modules:/app/node_modules

volumes:
  pgdata:
  comicrealmfe-node_modules: